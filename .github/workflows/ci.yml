name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      # Build last so a typecheck/lint/test failure surfaces faster.
      # Build needs a stub PAYLOAD_SECRET so payload.config.ts loads;
      # no real DB is required because we don't run migrations here.
      - name: Build
        run: npm run build
        env:
          PAYLOAD_SECRET: ci-stub-secret-not-used-in-production
          DATABASE_URL: postgres://stub:stub@127.0.0.1:5432/stub
          NEXT_PUBLIC_SITE_URL: https://archbishopvalokeke.org
